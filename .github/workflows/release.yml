name: release
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Override version to release, e.g. 0.7.1 (blank = auto-compute from commits)"
        required: false
        default: ""
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4
      - name: mise run ci
        run: mise run ci
      - name: release
        run: mise run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
