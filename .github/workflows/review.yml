name: review
on:
  pull_request:
    types: [opened, reopened, synchronize]
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4
      - name: mise run ci
        run: mise run ci
      - name: lint commits
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: mise run lint:commits
